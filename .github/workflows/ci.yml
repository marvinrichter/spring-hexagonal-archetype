name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and run archetype integration tests
        # mvn verify:
        #   1. Installs the archetype into the local Maven repo
        #   2. Generates a project from the archetype (archetype-plugin integration test)
        #   3. Runs the generated project's full test suite:
        #      - Unit tests (Surefire)
        #      - ArchUnit architecture tests (Surefire)
        #      - Testcontainers PostgreSQL integration tests (Failsafe)
        #
        # Docker is available by default on ubuntu-latest GitHub-hosted runners.
        # The api.version=1.44 system property (set in the generated pom's Failsafe config)
        # ensures compatibility with Docker Engine 27+.
        run: mvn --batch-mode verify
